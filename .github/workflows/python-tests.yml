name: Python Tests

on:
  push:
    branches: [ main, bugfix-academic-scripts-repair ]
    paths:
      - 'academic_writing/**/*.py'
      - '.github/workflows/python-tests.yml'
  pull_request:
    branches: [ main, bugfix-academic-scripts-repair ]
    paths:
      - 'academic_writing/**/*.py'

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Run tests
      run: |
        python -m unittest discover academic_writing/tests
